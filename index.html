<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léo | Portfolio Modern</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --text: #f8fafc;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
            z-index: -1;
        }

        .menu-toggle {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 1000;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 10px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
        }

        .bar {
            width: 30px;
            height: 3px;
            background-color: white;
            border-radius: 2px;
            transition: 0.3s;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            z-index: 999;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding: 100px 40px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar.active {
            left: 0;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
            transition: 0.3s;
            opacity: 0.7;
            cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            opacity: 1;
            color: var(--primary);
            padding-left: 10px;
        }

        .page-section {
            display: none;
            width: 100%;
            min-height: 100vh;
            padding: 100px 5%;
            animation: fadeIn 0.6s ease;
        }

        .page-section.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hero {
            text-align: center;
            max-width: 900px;
        }

        .hero h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .highlight {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            margin-top: 50px;
        }

        .project-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .project-card:hover {
            transform: translateY(-12px);
            border-color: var(--primary);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .project-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            transition: 0.5s ease;
        }

        .project-card:hover .project-image {
            transform: scale(1.08);
        }

        .project-info {
            padding: 25px;
            text-align: center;
            background: rgba(15, 23, 42, 0.3);
        }

        .project-info h3 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .btn {
            padding: 1.2rem 2.8rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            background: var(--primary);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
            margin-top: 2rem;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-5px);
            background: var(--secondary);
            box-shadow: 0 15px 35px rgba(168, 85, 247, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="menu-toggle" id="menuBtn">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <nav class="sidebar" id="sidebar">
        <div class="nav-link active" onclick="showPage('accueil')">Accueil</div>
        <div class="nav-link" onclick="showPage('projets')">Projets</div>
    </nav>

    <section id="accueil" class="page-section active">
        <div class="hero">
            <h1>Salut je m’appelle <span class="highlight">Léo</span><br>je fais des jeux en code html avec <span class="highlight">Gemini</span></h1>
            <p style="color: #94a3b8; font-size: 1.2rem; margin-top: 10px;">Exploration, Code & Gaming.</p>
            <button class="btn" onclick="showPage('projets')">Découvrir mes projets</button>
        </div>
    </section>

    <section id="projets" class="page-section">
        <h2 style="font-size: 3rem; font-weight: 900; margin-bottom: 20px;">Mes <span class="highlight">Projets</span></h2>
        <div class="projects-grid">
            
            <a href="https://nova-strike-sage.vercel.app" target="_blank" class="project-card">
                <img src="https://files.catbox.moe/g2478u.png" alt="Nova Strike" class="project-image">
                <div class="project-info">
                    <h3>Nova Strike</h3>
                </div>
            </a>

            <a href="https://leoxx35.github.io" target="_blank" class="project-card">
                <img src="https://files.catbox.moe/kixq16.png" alt="Zen Flux" class="project-image">
                <div class="project-info">
                    <h3>Zen Flux</h3>
                </div>
            </a>

        </div>
    </section>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');

        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = sidebar.classList.contains('active') ? 'rotate(45deg) translate(7px, 6px)' : 'none';
            bars[1].style.opacity = sidebar.classList.contains('active') ? '0' : '1';
            bars[2].style.transform = sidebar.classList.contains('active') ? 'rotate(-45deg) translate(7px, -6px)' : 'none';
        });

        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(section => section.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            sidebar.classList.remove('active');
            
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = 'none';
            bars[1].style.opacity = '1';
            bars[2].style.transform = 'none';
            
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
